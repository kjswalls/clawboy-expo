<?xml version="1.0" encoding="UTF-8"?>
<svg width="1024" height="1024" viewBox="0 0 1024 1024" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <!-- Base: near-black to dark navy diagonal -->
    <linearGradient id="bg" x1="0" y1="0" x2="1024" y2="1024" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#1A1A2E"/>
      <stop offset="1" stop-color="#080B12"/>
    </linearGradient>
    <!-- Faint purple tint radial shine - unique to dark variant -->
    <radialGradient id="shine" cx="280" cy="260" r="700" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#A855F7" stop-opacity="0.16"/>
      <stop offset="0.4" stop-color="#A855F7" stop-opacity="0.05"/>
      <stop offset="1"   stop-color="#A855F7" stop-opacity="0"/>
    </radialGradient>
    <!-- White specular hotspot on top of purple tint -->
    <radialGradient id="specular" cx="280" cy="260" r="520" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#FFFFFF" stop-opacity="0.16"/>
      <stop offset="1" stop-color="#FFFFFF" stop-opacity="0"/>
    </radialGradient>
    <!-- Deep bottom-right vignette -->
    <radialGradient id="vignette" cx="820" cy="880" r="900" gradientUnits="userSpaceOnUse">
      <stop offset="0" stop-color="#000000" stop-opacity="0.65"/>
      <stop offset="1" stop-color="#000000" stop-opacity="0"/>
    </radialGradient>
    <!--
      Glyph gradient fill - path-space coordinates (y: 322 top -> 698 bottom).
      More contrast at bottom than purple-large since dark bg needs stronger tint to read.
    -->
    <linearGradient id="glyphFill" x1="515" y1="322" x2="515" y2="698" gradientUnits="userSpaceOnUse">
      <stop offset="0"   stop-color="#FFFFFF"/>
      <stop offset="1"   stop-color="#C4BCE8"/>
    </linearGradient>
    <!--
      3D depth filter: large soft shadow, even more pronounced on dark bg
      so the elevation reads clearly against the near-black surface.
    -->
    <filter id="depth" x="-18%" y="-18%" width="136%" height="136%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="10" result="blur"/>
      <feOffset dx="0" dy="12" result="offsetBlur"/>
      <feComponentTransfer result="shadow">
        <feFuncA type="linear" slope="0.55"/>
      </feComponentTransfer>
      <feMerge>
        <feMergeNode in="shadow"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <rect width="1024" height="1024" fill="url(#bg)"/>
  <rect width="1024" height="1024" fill="url(#shine)"/>
  <rect width="1024" height="1024" fill="url(#specular)"/>
  <rect width="1024" height="1024" fill="url(#vignette)"/>

  <!-- Glyph at 1.54x scale (matching icon-purple-large), gradient-filled for 3D depth -->
  <g fill="url(#glyphFill)" filter="url(#depth)"
